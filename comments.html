<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Comments · My Basket</title>
<style>
  :root {
    --bg: #121218;
    --panel: #1b1b26;
    --pink: #ff9ecb;
    --violet: #c9a6ff;
    --cyan: #7df9ff;
    --gold: #ffd24c;
    --text: #f3f3f7;
    --muted: #b8b2c4;
    --border: rgba(255,158,203,0.15);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 28px;
    transition: color 0.2s ease;
  }
  .back-link:hover { color: var(--pink); }

  h1 {
    text-align: center;
    font-size: 26px;
    margin: 0 0 6px;
    background: linear-gradient(135deg, var(--violet), var(--pink));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 13.5px;
    margin: 0 0 32px;
  }

  /* ─── Submission form ─── */
  .comment-form {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 36px;
  }
  .comment-form label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 6px;
  }
  .comment-form input,
  .comment-form textarea {
    width: 100%;
    background: #14141c;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 13.5px;
    outline: none;
    margin-bottom: 14px;
    resize: vertical;
  }
  .comment-form input:focus,
  .comment-form textarea:focus { border-color: rgba(255,158,203,0.5); }
  .comment-form textarea { min-height: 90px; }
  .char-count {
    text-align: right;
    font-size: 11px;
    color: var(--muted);
    margin: -10px 0 14px;
  }
  #comment-submit-btn {
    display: block;
    width: 100%;
    padding: 12px;
    border-radius: 999px;
    border: none;
    background: linear-gradient(135deg, var(--violet), var(--pink));
    color: #1b1b26;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #comment-submit-btn:hover { transform: translateY(-2px) scale(1.02); }
  #comment-submit-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
  .form-note {
    font-size: 11.5px;
    color: var(--muted);
    text-align: center;
    margin-top: 10px;
  }
  #comment-thanks {
    display: none;
    text-align: center;
    padding: 16px 0;
    color: var(--gold);
    font-weight: 700;
    font-size: 14px;
  }

  /* ─── Comment list ─── */
  .comment-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .comment-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
    gap: 10px;
  }
  .comment-name {
    font-weight: 800;
    color: var(--pink);
    font-size: 14px;
  }
  .comment-date {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }
  .comment-text {
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .comment-reactions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .reaction-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: var(--muted);
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .reaction-btn:hover {
    border-color: rgba(255,158,203,0.5);
    background: rgba(255,158,203,0.1);
    transform: translateY(-1px);
  }
  .reaction-btn.reacted {
    border-color: transparent;
    background: linear-gradient(135deg, #ff9ecb, #c9a6ff);
    color: #1b1b26;
    cursor: default;
    transform: none;
  }
  .reaction-btn .r-count { font-variant-numeric: tabular-nums; }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 40px 20px;
    font-size: 14px;
    line-height: 1.7;
  }
  .empty-state .big { font-size: 36px; margin-bottom: 10px; }

  footer {
    text-align: center;
    padding: 36px 0 10px;
    color: #7a7588;
    font-size: 12.5px;
  }
  footer a {
    color: #7a7588;
    text-decoration: none;
    border-bottom: 1px dashed rgba(255,158,203,0.3);
  }
</style>
</head>
<body>
  <div class="wrap">
    <a class="back-link" href="./index.html">← Back to the basket</a>
    <h1>💬 Comments</h1>
    <p class="subtitle">Leave a little note — Nana reads and approves every comment before it shows up here.</p>

    <div class="comment-form">
      <label for="comment-name">Your name (optional)</label>
      <input id="comment-name" type="text" placeholder="Anonymous" maxlength="40" />
      <label for="comment-text">Your comment</label>
      <textarea id="comment-text" placeholder="Say something nice... or just say hi! 🩷" maxlength="300"></textarea>
      <div class="char-count"><span id="comment-char-count">0</span> / 300</div>
      <button id="comment-submit-btn" disabled>✨ Submit comment</button>
      <div class="form-note">Your comment won't appear instantly — it's reviewed first.</div>
      <div id="comment-thanks">✨ Thanks! Your comment was sent for review.</div>
    </div>

    <div id="comments-container">
      <div class="empty-state">
        <div class="big">💬</div>
        Loading comments…
      </div>
    </div>

    <footer>
      <a href="./index.html">← Full wishlist</a> &nbsp;·&nbsp;
      <a href="./about.html">About this page</a>
    </footer>
  </div>

  <script data-goatcounter="https://nana677.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <script>
    const nameInput = document.getElementById("comment-name");
    const textInput = document.getElementById("comment-text");
    const charCount = document.getElementById("comment-char-count");
    const submitBtn = document.getElementById("comment-submit-btn");
    const thanksEl = document.getElementById("comment-thanks");
    const formEl = document.querySelector(".comment-form");

    textInput.addEventListener("input", () => {
      charCount.textContent = textInput.value.length;
      submitBtn.disabled = textInput.value.trim().length === 0;
    });

    submitBtn.addEventListener("click", () => {
      const text = textInput.value.trim();
      if (!text) return;
      const name = (nameInput.value.trim() || "Anonymous").slice(0, 40);

      const path = "/comment-proposal/" + Date.now() + "-" + Math.random().toString(36).slice(2, 6);
      const title = name + " ||| " + text.slice(0, 300);

      if (window.goatcounter && window.goatcounter.count) {
        window.goatcounter.count({ path: path, title: title, event: true });
      }

      [nameInput, textInput, submitBtn, document.querySelector(".char-count")].forEach(el => el.style.display = "none");
      document.querySelectorAll(".comment-form label").forEach(el => el.style.display = "none");
      thanksEl.style.display = "block";
    });

    const GOATCOUNTER_BASE = "https://nana677.goatcounter.com";
    const REACTIONS = [
      { type: "heart", emoji: "🩷" },
      { type: "love", emoji: "😍" },
    ];

    function getMyReactions() {
      try { return JSON.parse(localStorage.getItem("myCommentReactions")) || []; } catch (e) { return []; }
    }
    function rememberReaction(key) {
      const mine = getMyReactions();
      if (!mine.includes(key)) {
        mine.push(key);
        localStorage.setItem("myCommentReactions", JSON.stringify(mine));
      }
    }

    async function fetchReactionCount(path) {
      try {
        const res = await fetch(GOATCOUNTER_BASE + "/counter/" + encodeURIComponent(path) + ".json");
        if (!res.ok) return 0;
        const data = await res.json();
        return data.count_unique || data.count || 0;
      } catch (e) {
        return 0;
      }
    }

    async function loadComments() {
      const container = document.getElementById("comments-container");
      try {
        const res = await fetch("./comments.json?t=" + Date.now());
        if (!res.ok) throw new Error("HTTP " + res.status);
        const comments = await res.json();

        if (!comments.length) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="big">💬</div>
              No comments yet — be the first to leave one!
            </div>`;
          return;
        }

        const mine = getMyReactions();
        const sorted = [...comments].sort((a, b) => new Date(b.date) - new Date(a.date));
        container.innerHTML = sorted.map(c => {
          const date = c.date ? new Date(c.date).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" }) : "";
          const reactionsHtml = REACTIONS.map(r => {
            const key = c.id + ":" + r.type;
            const reacted = mine.includes(key);
            return `<button class="reaction-btn${reacted ? " reacted" : ""}" data-comment-id="${c.id}" data-reaction="${r.type}" ${reacted ? "disabled" : ""}>${r.emoji} <span class="r-count">${reacted ? "" : ""}</span></button>`;
          }).join("");
          return `
            <div class="comment-card">
              <div class="comment-head">
                <span class="comment-name">${(c.name || "Anonymous").replace(/</g, "&lt;")}</span>
                <span class="comment-date">${date}</span>
              </div>
              <div class="comment-text">${(c.text || "").replace(/</g, "&lt;")}</div>
              <div class="comment-reactions">${reactionsHtml}</div>
            </div>
          `;
        }).join("");

        // Fetch and fill in real counts (don't block the initial render)
        container.querySelectorAll(".reaction-btn").forEach(async (btn) => {
          const path = "/comment-reaction/" + btn.dataset.commentId + "/" + btn.dataset.reaction;
          const count = await fetchReactionCount(path);
          const countEl = btn.querySelector(".r-count");
          if (countEl) countEl.textContent = count > 0 ? count : "";
        });

        container.querySelectorAll(".reaction-btn:not([disabled])").forEach((btn) => {
          btn.addEventListener("click", () => {
            const commentId = btn.dataset.commentId;
            const type = btn.dataset.reaction;
            const key = commentId + ":" + type;
            const path = "/comment-reaction/" + commentId + "/" + type;

            if (window.goatcounter && window.goatcounter.count) {
              window.goatcounter.count({ path: path, title: "Comment reaction", event: true });
            }

            rememberReaction(key);
            btn.disabled = true;
            btn.classList.add("reacted");
            const countEl = btn.querySelector(".r-count");
            if (countEl) countEl.textContent = (parseInt(countEl.textContent) || 0) + 1;
          });
        });
      } catch (err) {
        console.error("Comments load error:", err);
        container.innerHTML = `
          <div class="empty-state">
            <div class="big">😢</div>
            Couldn't load comments right now. Try again later!
          </div>`;
      }
    }

    loadComments();
  </script>
</body>
</html>
