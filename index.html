<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>My Temu Basket</title>

    <!-- OG / Schema tags — filled dynamically from URL params so Throne can scrape them -->
    <meta property="og:type"           content="product" id="og-type">
    <meta property="og:title"          content=""        id="og-title">
    <meta property="og:image"          content=""        id="og-image">
    <meta property="og:url"            content=""        id="og-url">
    <meta property="og:price:amount"   content=""        id="og-price">
    <meta property="og:price:currency" content="EUR"     id="og-currency">
    <script id="throne-ld" type="application/ld+json">{}</script>
    <script>
      // On page load: if URL has product params, inject them into meta tags
      // (This is what Throne's server sees when it fetches the URL)
      (function() {
        const p = new URLSearchParams(location.search);
        if (!p.get("title")) return;
        document.title = p.get("title");
        const set = (id, val) => { const el = document.getElementById(id); if (el) el.setAttribute("content", val); };
        set("og-title",    p.get("title") || "");
        set("og-image",    p.get("image") || "");
        set("og-url",      p.get("link")  || "");
        set("og-price",    p.get("price") || "");
        const ld = document.getElementById("throne-ld");
        if (ld) ld.textContent = JSON.stringify({
          "@context": "https://schema.org/",
          "@type": "Product",
          "name":  p.get("title") || "",
          "image": p.get("image") || "",
          "url":   p.get("link")  || "",
          "offers": { "@type": "Offer", "price": p.get("price") || "0", "priceCurrency": "EUR",
                      "availability": "https://schema.org/InStock", "url": p.get("link") || "" }
        });

        // Auto-trigger Throne when loaded in iframe mode (_throne=1)
        if (p.get("_throne") === "1") {
          window.addEventListener("load", function() {
            const INJECT_URL = "https://throne.com/bookmarklet/inject.js";
            const s = document.createElement("script");
            s.setAttribute("charset", "UTF-8");
            s.setAttribute("src", INJECT_URL);
            s.setAttribute("data-add-to", "wishlist");
            document.body.appendChild(s);
          });
          // Relay Throne's closeBookmarklet message up to the parent window
          window.addEventListener("message", function(t) {
            const val = t.data || t.message;
            if (val === "closeBookmarklet") {
              window.parent.postMessage("closeBookmarklet", "*");
            }
          });
        }
      })();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/masonry/4.2.2/masonry.pkgd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.imagesloaded/5.0.0/imagesloaded.pkgd.min.js"></script>

    <style>

        right: -6px;

      }

  <!-- ✨ magical sparkles on mouse move -->
  <script>
    const sparkleColors = [
      "#ff9ecb",
      "#c9a6ff",
      "#7df9ff",
      "#fff9b0",
      "#ffb3c6",
    ];

    document.addEventListener("mousemove", (e) => {
      const sparkle = document.createElement("div");
      sparkle.style.position = "fixed";
      sparkle.style.left = e.clientX + "px";
      sparkle.style.top = e.clientY + "px";
      sparkle.style.width = "6px";
      sparkle.style.height = "6px";
      sparkle.style.background =
        sparkleColors[Math.floor(Math.random() * sparkleColors.length)];
      sparkle.style.borderRadius = "50%";
      sparkle.style.pointerEvents = "none";
      sparkle.style.opacity = 1;
      sparkle.style.transform = `translate(-50%, -50%) scale(1)`;
      sparkle.style.transition = "all 0.8s ease-out";

      document.body.appendChild(sparkle);

      requestAnimationFrame(() => {
        sparkle.style.transform = `translate(-50%, -50%) scale(0.2)`;
        sparkle.style.opacity = 0;
      });

      setTimeout(() => sparkle.remove(), 800);
    });
  </script>
  <!-- 🩷 floating hearts -->
  <script>
    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerText = "🩷";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = 4 + Math.random() * 4 + "s";

      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 8000);
    }

    setInterval(createHeart, 900);
  </script>

  <body>

    <!-- 🔗 Share toast -->
    <div id="share-toast">

    <div
      id="sort-buttons"
      style="

    >

        <div class="modal-title" id="modal-title"></div>

        <a id="modal-link" class="modal-store-btn" href="#" target="_blank">🛒 View on Temu</a>

        <button id="modal-throne" class="modal-store-btn" style="border:none;cursor:pointer;background:linear-gradient(135deg,#ff9ecb,#c9a6ff);color:#121218;">👑 Add to Throne wishlist</button>
        <div id="throne-status" style="margin-top:12px;font-size:12px;color:#c9a6ff;min-height:18px;"></div>

    <!-- 📸 Screenshot overlay -->
    <div id="screenshot-overlay">
      <img id="screenshot-preview" src="" alt="Basket screenshot">
      <div class="screenshot-actions">
        <a id="screenshot-download" download="my-basket.png">⬇️ Download</a>
        <button id="screenshot-close-btn">✕ Close</button>
      </div>
    </div>

    <div class="gallery" id="gallery"></div>

    <script>
      const gallery = document.getElementById("gallery");
      const counter = document.getElementById("counter");

      // Modal close logic — restore original URL
      function closeModal() {
        document.getElementById("product-modal").classList.remove("open");
        history.replaceState(null, "", location.pathname);
        document.title = "My Temu Basket";
      }
      document.getElementById("modal-close").addEventListener("click", closeModal);
      document.getElementById("product-modal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("product-modal")) closeModal();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });

      // Load saved favorites once
      let rawProducts = []; // 🌟 make this global so sorting and wishlist can use it
      let favorites = JSON.parse(localStorage.getItem("temuFavorites")) || [];
      let throneAdded = new Set(JSON.parse(localStorage.getItem("temuThroneAdded")) || []);
      let showingWishlist = sessionStorage.getItem("showingWishlist") === "1";

      // Fetch JSON
      document
        .getElementById("jsonLoader")
        .addEventListener("change", function (event) {
          const file = event.target.files[0];
          if (!file) return;

          const reader = new FileReader();

          reader.onload = function (e) {
            try {
              rawProducts = JSON.parse(e.target.result);

              localStorage.setItem("temuBasketData", e.target.result);

              displayProducts(rawProducts);

              // 👻 hide after loading
              jsonLoader.style.opacity = "0";
              setTimeout(() => (jsonLoader.style.display = "none"), 400);
            } catch (err) {
              counter.innerText = "Invalid JSON file.";
              console.error(err);
            }
          };

          reader.readAsText(file);
        });

      // Toggle favorite helper with cute pop + float
      function toggleFavorite(link, heartEl) {
        if (favorites.includes(link)) {
          favorites = favorites.filter((l) => l !== link);
          heartEl.classList.remove("favorited");
        } else {
          favorites.push(link);
          heartEl.classList.add("favorited");

          // 💖 Floating mini heart animation
          const miniHeart = document.createElement("div");
          miniHeart.innerText = "🩷";
          miniHeart.style.position = "absolute";
          miniHeart.style.left = "100%";
          miniHeart.style.top = "0%";
          miniHeart.style.transform = "translate(-50%, -50%) scale(1.2)";
          miniHeart.style.fontSize = "16px";
          miniHeart.style.opacity = "1";
          miniHeart.style.pointerEvents = "none";
          miniHeart.style.transition = "all 1s ease-out";

          heartEl.parentElement.appendChild(miniHeart);

          requestAnimationFrame(() => {
            miniHeart.style.transform = "translate(-50%, -150%) scale(0.5)";
            miniHeart.style.opacity = "0";
          });

          setTimeout(() => miniHeart.remove(), 1000);
        }

        localStorage.setItem("temuFavorites", JSON.stringify(favorites));
      }

      // 🥧 Pie chart — price range breakdown
      const _savedRange = sessionStorage.getItem("activeRangeFilter");
      let activeRangeFilter = (_savedRange !== null && _savedRange !== "") ? parseInt(_savedRange) : null; // null = show all, 0/1/2 = range index

      const PIE_RANGES = [
        { label: "< 5 €",  color: "#7df9ff", test: v => v < 5 },
        { label: "5–20 €", color: "#c9a6ff", test: v => v >= 5 && v < 20 },
        { label: "20 € +", color: "#ff9ecb", test: v => v >= 20 },
      ];

      function applyRangeFilter() {
        const base = showingWishlist
          ? rawProducts.filter(p => favorites.includes(p.link))
          : rawProducts;
        if (activeRangeFilter === null) {
          displayProducts(base);
        } else {
          const { test } = PIE_RANGES[activeRangeFilter];
          displayProducts(base.filter(p => test(priceNumber(p.price))));
        }
      }

      function renderPieChart(products) {
        const ranges = PIE_RANGES;
        const counts = ranges.map(() => 0);
        products.forEach(p => {
          const v = priceNumber(p.price);
          ranges.forEach((r, i) => { if (r.test(v)) counts[i]++; });
        });

        const total = counts.reduce((a, b) => a + b, 0);
        const svg = document.getElementById("pie-svg");
        const legend = document.getElementById("pie-legend");
        svg.innerHTML = "";
        legend.innerHTML = "";

        if (total === 0) {
          document.getElementById("pie-chart-wrapper").classList.remove("visible");
          return;
        }

        // Add glow filter for active slice
        const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
        defs.innerHTML = `<filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>`;
        svg.appendChild(defs);

        const cx = 55, cy = 55, r = 48;
        let startAngle = -Math.PI / 2;

        counts.forEach((count, i) => {
          if (count === 0) return;
          const slice = (count / total) * 2 * Math.PI;
          const endAngle = startAngle + slice;
          const isActive = activeRangeFilter === i;
          const isDimmed = activeRangeFilter !== null && !isActive;

          let el;
          if (count === total) {
            el = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            el.setAttribute("cx", cx); el.setAttribute("cy", cy); el.setAttribute("r", r);
            el.setAttribute("fill", ranges[i].color);
          } else {
            const x1 = cx + r * Math.cos(startAngle);
            const y1 = cy + r * Math.sin(startAngle);
            const x2 = cx + r * Math.cos(endAngle);
            const y2 = cy + r * Math.sin(endAngle);
            const large = slice > Math.PI ? 1 : 0;
            el = document.createElementNS("http://www.w3.org/2000/svg", "path");
            el.setAttribute("d", `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z`);
            el.setAttribute("fill", ranges[i].color);
            el.setAttribute("stroke", "#121218");
            el.setAttribute("stroke-width", isActive ? "3" : "1.5");
          }
          el.setAttribute("opacity", isDimmed ? "0.25" : "1");
          if (isActive) el.setAttribute("filter", "url(#glow)");
          el.style.cursor = "pointer";
          el.style.transition = "opacity 0.25s, transform 0.25s";
          el.addEventListener("click", () => {
            activeRangeFilter = (activeRangeFilter === i) ? null : i;
            sessionStorage.setItem("activeRangeFilter", activeRangeFilter === null ? "" : String(activeRangeFilter));
            applyRangeFilter();
          });
          svg.appendChild(el);

          // Legend item
          const pct = Math.round((count / total) * 100);
          const item = document.createElement("div");
          item.className = "pie-legend-item";
          item.style.cursor = "pointer";
          item.style.opacity = isDimmed ? "0.35" : "1";
          item.style.transition = "opacity 0.25s";
          if (isActive) item.style.textDecoration = "underline";
          item.innerHTML = `
            <div class="pie-legend-dot" style="background:${ranges[i].color}"></div>
            <span style="color:${ranges[i].color}">${ranges[i].label}</span>
            <span style="color:#aaa">${count} (${pct}%)</span>
          `;
          item.addEventListener("click", () => {
            activeRangeFilter = (activeRangeFilter === i) ? null : i;
            sessionStorage.setItem("activeRangeFilter", activeRangeFilter === null ? "" : String(activeRangeFilter));
            applyRangeFilter();
          });
          legend.appendChild(item);

          startAngle = endAngle;
        });

        // Donut hole
        const hole = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        hole.setAttribute("cx", cx); hole.setAttribute("cy", cy); hole.setAttribute("r", 22);
        hole.setAttribute("fill", "#121218");
        hole.style.pointerEvents = "none";
        svg.appendChild(hole);

        // "All" reset label in center when a filter is active
        if (activeRangeFilter !== null) {
          const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
          txt.setAttribute("x", cx); txt.setAttribute("y", cy + 5);
          txt.setAttribute("text-anchor", "middle");
          txt.setAttribute("fill", "#fff");
          txt.setAttribute("font-size", "15");
          txt.setAttribute("font-weight", "bold");
          txt.setAttribute("font-family", "Segoe UI, Arial, sans-serif");
          txt.style.cursor = "pointer";
          txt.style.pointerEvents = "all";
          txt.textContent = "✕";
          txt.addEventListener("click", () => { activeRangeFilter = null; sessionStorage.removeItem("activeRangeFilter"); applyRangeFilter(); });
          svg.appendChild(txt);
        }

        document.getElementById("pie-chart-wrapper").classList.add("visible");
      }

      // Display products
      function displayProducts(rawProducts) {
        const gallery = document.getElementById("gallery");
        gallery.innerHTML = "";

        const seen = new Set();
        const products = rawProducts.filter(
          (p) =>
            p.link.includes("goods.html") &&
            !seen.has(p.link) &&
            seen.add(p.link),
        );

        let total = 0;
        products.forEach((p) => {
          total += priceNumber(p.price) * (parseInt(p.quantity) || 1);
        });

        document.getElementById("counter").innerHTML =
          `<span class="total-badge">
          🧺 ${products.length} items • 💰 ${total.toFixed(2)} €
        </span>`;

        renderPieChart(products);

        products.forEach((product) => {
          const wrapper = document.createElement("div");
          wrapper.className = "card card-wrapper";
          wrapper.innerHTML = `
            <img src="${product.image}" alt="${product.title}" style="width:100%;border-radius:14px;margin-bottom:8px;cursor:pointer;">
            <div class="price-badge">💰 ${product.price || "?"} €</div>
            <div class="heartFav ${favorites.includes(product.link) ? "favorited" : ""}">♥</div>
            ${throneAdded.has(product.link) ? '<div class="throne-pin">👑 <span>Wishlisted</span></div>' : ''}
          `;

          // 🎨 Extract dominant color via CORS proxy and tint the card
          (function(card, imageUrl) {
            const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(imageUrl);
            const tempImg = new Image();
            tempImg.crossOrigin = "anonymous";
            tempImg.onload = function() {
              try {
                const canvas = document.createElement("canvas");
                canvas.width = 16; canvas.height = 16;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(tempImg, 0, 0, 16, 16);
                const d = ctx.getImageData(0, 0, 16, 16).data;
                let r = 0, g = 0, b = 0, count = 0;
                for (let i = 0; i < d.length; i += 4) {
                  const brightness = (d[i] + d[i+1] + d[i+2]) / 3;
                  const saturation = Math.max(d[i], d[i+1], d[i+2]) - Math.min(d[i], d[i+1], d[i+2]);
                  if (brightness > 235 || brightness < 15 || saturation < 20) continue;
                  r += d[i]; g += d[i+1]; b += d[i+2]; count++;
                }
                if (count < 5) return;
                r = Math.round(r / count);
                g = Math.round(g / count);
                b = Math.round(b / count);
                card.style.borderColor = `rgba(${r},${g},${b},0.6)`;
                card.style.boxShadow = `0 10px 30px rgba(0,0,0,0.6), 0 0 0 1px rgba(${r},${g},${b},0.4)`;
                card.style.background = `linear-gradient(160deg, rgba(${r},${g},${b},0.15) 0%, #1b1b26 55%)`;
                card.dataset.cr = r; card.dataset.cg = g; card.dataset.cb = b;
              } catch(e) {}
            };
            tempImg.src = proxyUrl;
          })(wrapper, product.image);

          // Open modal on image/card click (but not heart)
          wrapper.addEventListener("click", (e) => {
            if (e.target.classList.contains("heartFav")) return;
            document.getElementById("modal-img").src = product.image;
            document.getElementById("modal-img").alt = product.title;
            document.getElementById("modal-title").textContent = product.title || "";
            document.getElementById("modal-price").textContent = `💰 ${product.price || "?"} €`;
            document.getElementById("modal-link").href = product.link;

            // 🔑 Push URL with product data so Throne can fetch it server-side
            const priceClean = (product.price || "0").replace(",", ".");
            const params = new URLSearchParams({
              title: product.title || "",
              price: priceClean,
              image: product.image || "",
              link:  product.link  || ""
            });
            history.pushState(null, product.title || "", "?" + params.toString());
            document.title = product.title || "My Temu Basket";

            // Update live meta tags too (for local bookmarklet fallback)
            const setMeta = (id, val) => { const el = document.getElementById(id); if (el) el.setAttribute("content", val); };
            setMeta("og-title",  product.title || "");
            setMeta("og-image",  product.image || "");
            setMeta("og-url",    product.link  || "");
            setMeta("og-price",  priceClean);
            const ld = document.getElementById("throne-ld");
            if (ld) ld.textContent = JSON.stringify({
              "@context": "https://schema.org/", "@type": "Product",
              "name": product.title || "", "image": product.image || "", "url": product.link || "",
              "offers": { "@type": "Offer", "price": priceClean, "priceCurrency": "EUR",
                          "availability": "https://schema.org/InStock", "url": product.link || "" }
            });

            document.getElementById("modal-throne").onclick = () => {
              const status = document.getElementById("throne-status");
              const INJECT_URL = "https://throne.com/bookmarklet/inject.js";

              // Remove any previous Throne iframe
              document.querySelectorAll('iframe[data-throne]').forEach(el => el.remove());

              status.textContent = "⏳ Opening Throne...";

              // Build the product URL — this page already handles ?title=...&price=... params
              // and injects the right OG/schema meta tags on load, which is what Throne needs
              const currentURL = window.location.href; // already has ?title=...&price=... pushed

              // Create a hidden iframe pointing to the real GitHub Pages URL with product params
              // Throne will run inside it and see the correct window.location + meta tags
              const iframe = document.createElement("iframe");
              iframe.setAttribute("data-throne", "1");
              iframe.style.cssText = "position:fixed;inset:0;width:100%;height:100%;border:none;z-index:9999;background:transparent;";
              iframe.allow = "clipboard-write";

              // Pass a flag so the iframe page auto-triggers Throne on load
              const throneURL = currentURL + (currentURL.includes("?") ? "&" : "?") + "_throne=1";

              // Save scroll position and current product link to sessionStorage
              sessionStorage.setItem("throneScroll", String(window.scrollY));
              sessionStorage.setItem("throneLastLink", product.link);

              // Listen for Throne's close message from the iframe
              const onMsg = (t) => {
                const val = t.data || t.message;
                if (val === "closeBookmarklet") {
                  iframe.remove();
                  window.removeEventListener("message", onMsg);
                  // Mark as added to Throne using sessionStorage link (closure may be stale)
                  const addedLink = sessionStorage.getItem("throneLastLink");
                  if (addedLink) {
                    throneAdded.add(addedLink);
                    localStorage.setItem("temuThroneAdded", JSON.stringify([...throneAdded]));
                    sessionStorage.removeItem("throneLastLink");
                  }
                  // Reload to restore layout cleanly, scroll will be restored on load
                  window.location.replace(location.pathname);
                }
              };
              window.addEventListener("message", onMsg);

              iframe.src = throneURL;
              document.body.appendChild(iframe);
              status.textContent = "";
            };
            document.getElementById("product-modal").classList.add("open");
          });

          const heart = wrapper.querySelector(".heartFav");
          heart.addEventListener("click", () =>
            toggleFavorite(product.link, heart),
          );

          gallery.appendChild(wrapper);
        });

        // Init Masonry after all images have loaded so heights are correct
        imagesLoaded(gallery, function () {
          new Masonry(gallery, {
            itemSelector: ".card",
            columnWidth: ".card",
            gutter: 6,
            percentPosition: false,
            fitWidth: true,
          });
          gallery.style.margin = "0 auto";

          // Staggered card entrance — each card pops in with a cascading delay
          const cards = gallery.querySelectorAll(".card");
          cards.forEach((card, i) => {
            setTimeout(() => card.classList.add("card-visible"), i * 55);
          });

          // Restore scroll after Throne reload — layout is now settled
          const _masonryScroll = sessionStorage.getItem("throneScroll");
          if (_masonryScroll) {
            window.scrollTo({ top: parseInt(_masonryScroll), behavior: "instant" });
            // Clear on next manual scroll so it doesn't persist forever
            window.addEventListener("wheel",    () => sessionStorage.removeItem("throneScroll"), { once: true });
            window.addEventListener("touchmove", () => sessionStorage.removeItem("throneScroll"), { once: true });
          }
        });
      }
      const jsonLoader = document.getElementById("jsonLoader");

      // 🔁 auto load saved basket if it exists
      const savedBasket = localStorage.getItem("temuBasketData");

      if (savedBasket) {
        try {
          rawProducts = JSON.parse(savedBasket);
          // Re-apply saved filters after load
          if (showingWishlist || activeRangeFilter !== null) {
            applyRangeFilter();
          } else {
            displayProducts(rawProducts);
          }

          // 👻 hide the file picker
          jsonLoader.style.display = "none";
        } catch (e) {
          console.error("Saved basket corrupted");
        }
      }
      // Restore wishlist toggle button label
      if (showingWishlist) {
        document.getElementById("wishlist-toggle").innerText = "Show All Products 🛒";
      }



      // Reset basket button
      document.getElementById("clear-basket").addEventListener("click", () => {
        localStorage.removeItem("temuBasketData");
        location.reload();
      });
      // Wishlist filter toggle
      document
        .getElementById("wishlist-toggle")
        .addEventListener("click", () => {
          showingWishlist = !showingWishlist;
          sessionStorage.setItem("showingWishlist", showingWishlist ? "1" : "0");
          activeRangeFilter = null;
          document.getElementById("wishlist-toggle").innerText = showingWishlist
            ? "Show All Products 🛒"
            : "Show Wishlist ❤️";
          const filtered = showingWishlist
            ? rawProducts.filter((p) => favorites.includes(p.link))
            : rawProducts;

          displayProducts(filtered);
        });

      // Helper to convert price string to number
      function priceNumber(p) {
        return parseFloat((p || "0").replace(",", "."));
      }

      // Sorting buttons that respect wishlist filter
      document.getElementById("sort-low").addEventListener("click", () => {
        const base = showingWishlist
          ? rawProducts.filter((p) => favorites.includes(p.link))
          : rawProducts;

        const sorted = [...base].sort(
          (a, b) => priceNumber(b.price) - priceNumber(a.price),
        );
        displayProducts(sorted);
      });

      document.getElementById("sort-high").addEventListener("click", () => {
        const base = showingWishlist
          ? rawProducts.filter((p) => favorites.includes(p.link))
          : rawProducts;

        const sorted = [...base].sort(
          (a, b) => priceNumber(a.price) - priceNumber(b.price),
        );
        displayProducts(sorted);
      });

      document.querySelectorAll("#sort-low, #sort-high").forEach((btn) => {
        btn.addEventListener("click", () => {
          const heart = document.createElement("div");
          heart.innerText = "🩷";
          heart.style.position = "fixed";
          heart.style.left =
            btn.getBoundingClientRect().left + btn.offsetWidth / 2 + "px";
          heart.style.top = btn.getBoundingClientRect().top + "px";
          heart.style.fontSize = "18px";
          heart.style.opacity = "1";
          heart.style.transform = "translate(-50%, 0) scale(1)";
          heart.style.transition = "all 0.8s ease-out";
          document.body.appendChild(heart);

          requestAnimationFrame(() => {
            heart.style.transform = "translate(-50%, -100px) scale(0.5)";
            heart.style.opacity = "0";
          });

          setTimeout(() => heart.remove(), 800);
        });
      });
      // Search filter that respects wishlist filter
      const searchInput = document.getElementById("search");

      searchInput.addEventListener("input", () => {
        const term = searchInput.value.toLowerCase();

        const base = showingWishlist
          ? rawProducts.filter((p) => favorites.includes(p.link))
          : rawProducts;

        const filtered = base.filter((p) =>
          (p.title || "").toLowerCase().includes(term),
        );

        displayProducts(filtered);
      });

      // 📸 Screenshot — use native screen capture API
      document.getElementById("screenshot-btn").addEventListener("click", async () => {
        const btn = document.getElementById("screenshot-btn");
        btn.disabled = true;
        btn.textContent = "⏳ Capturing...";

        try {
          // Ask browser to capture the current tab
          const stream = await navigator.mediaDevices.getDisplayMedia({
            video: { displaySurface: "browser" },
            preferCurrentTab: true,
          });

          // Give browser a moment to actually capture
          await new Promise(r => setTimeout(r, 300));

          const track = stream.getVideoTracks()[0];
          const imageCapture = new ImageCapture(track);
          const bitmap = await imageCapture.grabFrame();
          stream.getTracks().forEach(t => t.stop());

          // Draw to canvas and export
          const canvas = document.createElement("canvas");
          canvas.width = bitmap.width;
          canvas.height = bitmap.height;
          canvas.getContext("2d").drawImage(bitmap, 0, 0);

          const dataURL = canvas.toDataURL("image/png");
          document.getElementById("screenshot-preview").src = dataURL;
          document.getElementById("screenshot-download").href = dataURL;
          document.getElementById("screenshot-overlay").classList.add("open");

        } catch (err) {
          if (err.name !== "NotAllowedError") {
            console.error("Screenshot failed:", err);
            alert("Screenshot failed — try again!");
          }
        } finally {
          btn.disabled = false;
          btn.textContent = "📸 Screenshot";
        }
      });

      document.getElementById("screenshot-close-btn").addEventListener("click", () => {
        document.getElementById("screenshot-overlay").classList.remove("open");
      });

      // 🔗 Share basket via GitHub Gist
      document.getElementById("share-btn").addEventListener("click", async () => {
        if (!rawProducts || rawProducts.length === 0) {
          alert("Load a basket first!");
          return;
        }

        // Get or ask for GitHub token (stored locally, never sent anywhere but api.github.com)
        let ghToken = localStorage.getItem("ghToken");
        if (!ghToken) {
          ghToken = prompt("Enter a GitHub Personal Access Token with 'gist' scope:\n(stored locally in your browser, only used to create secret gists)");
          if (!ghToken) return;
          localStorage.setItem("ghToken", ghToken.trim());
        }
        ghToken = ghToken.trim();

        const btn = document.getElementById("share-btn");
        btn.disabled = true;
        btn.textContent = "⏳ Uploading...";

        try {
          const res = await fetch("https://api.github.com/gists", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `token ${ghToken}`
            },
            body: JSON.stringify({
              description: "My Temu Basket 🧺",
              public: false,
              files: {
                "basket.json": { content: JSON.stringify(rawProducts, null, 2) }
              }
            })
          });

          const gist = await res.json();
          if (!gist.id) {
            // Bad token — clear it so user can re-enter
            if (res.status === 401) {
              localStorage.removeItem("ghToken");
              alert("Invalid token — it's been cleared. Click Share again to re-enter.");
            } else {
              throw new Error("Gist creation failed: " + (gist.message || "unknown error"));
            }
            return;
          }

          // Build the shareable URL: our page + ?gist=ID
          const shareURL = `${location.origin}${location.pathname}?gist=${gist.id}`;

          // Copy to clipboard
          await navigator.clipboard.writeText(shareURL);

          // Show toast
          const toast = document.getElementById("share-toast");
          const link = document.getElementById("share-link");
          link.href = shareURL;
          link.textContent = "open ↗";
          toast.classList.add("visible");
          setTimeout(() => toast.classList.remove("visible"), 5000);

        } catch (err) {
          console.error("Share failed:", err);
          alert("Share failed — check console.");
        } finally {
          btn.disabled = false;
          btn.textContent = "🔗 Share Basket";
        }
      });

      // 🔗 On load: if ?gist=ID in URL, fetch and load that basket
      (async function loadFromGist() {
        const gistId = new URLSearchParams(location.search).get("gist");
        if (!gistId) return;

        try {
          const res = await fetch(`https://api.github.com/gists/${gistId}`);
          const gist = await res.json();
          const file = gist.files && gist.files["basket.json"];
          if (!file) throw new Error("basket.json not found in gist");

          // Fetch raw content (may be truncated otherwise)
          const raw = await fetch(file.raw_url);
          rawProducts = await raw.json();

          localStorage.setItem("temuBasketData", JSON.stringify(rawProducts));
          displayProducts(rawProducts);

          // Hide file picker
          const loader = document.getElementById("jsonLoader");
          if (loader) { loader.style.opacity = "0"; setTimeout(() => loader.style.display = "none", 400); }

          // Clean URL
          history.replaceState(null, "", location.pathname);
        } catch (err) {
          console.error("Failed to load gist:", err);
        }
      })();

      // 🔖 Bookmarklet
      const BOOKMARKLET = `javascript:(() => {  const products = [];  document.querySelectorAll('a[href*="goods.html"]').forEach((linkEl) => {    const container = linkEl.closest("div[class*='sc-s-']");    if (!container) return;    const title = linkEl.innerText.trim();    const imgEl = container.querySelector("img[src*='kwcdn']");    const image = imgEl ? imgEl.src : "";    const priceEl = [...container.querySelectorAll("span")]      .find((el) => el.textContent.match(/^\\d+[,\\.]\\d+$/));    const price = priceEl ? priceEl.textContent.trim() : "";    const qtyInput = container.querySelector("input[value]");    const quantity = qtyInput ? qtyInput.value : "1";    products.push({      title,      link: "https://www.temu.com" + linkEl.getAttribute("href"),      image,      price,      quantity,    });  });  const blob = new Blob([JSON.stringify(products, null, 2)], {    type: "application/json",  });  const a = document.createElement("a");  a.href = URL.createObjectURL(blob);  a.download = "temu-basket.json";  a.click();  alert("Temu basket exported!");})();`;

      document.getElementById("bookmarklet-btn").addEventListener("click", () => {
        document.getElementById("bookmarklet-link").href = BOOKMARKLET;
        document.getElementById("bookmarklet-code").value = BOOKMARKLET;
        document.getElementById("bookmarklet-modal").style.display = "flex";
      });
      document.getElementById("bookmarklet-close").addEventListener("click", () => {
        document.getElementById("bookmarklet-modal").style.display = "none";
      });
      document.getElementById("bookmarklet-modal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("bookmarklet-modal"))
          document.getElementById("bookmarklet-modal").style.display = "none";
      });
      document.getElementById("bookmarklet-copy").addEventListener("click", () => {
        navigator.clipboard.writeText(BOOKMARKLET);
        const btn = document.getElementById("bookmarklet-copy");
        btn.textContent = "✅ Copied!";
        setTimeout(() => btn.textContent = "📋 Copy", 2000);
      });

      // 🔝 Back to top button
      window.addEventListener("scroll", () => {
        const btn = document.getElementById("back-to-top");
        if (btn) btn.classList.toggle("visible", window.scrollY > 300);
      });
      document.addEventListener("click", (e) => {
        if (e.target && e.target.id === "back-to-top") {
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      });
    </script>
