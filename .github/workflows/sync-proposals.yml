name: Sync GoatCounter proposals

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync proposals from GoatCounter
        env:
          GOATCOUNTER_API_TOKEN: ${{ secrets.GOATCOUNTER_API_TOKEN }}
        run: node scripts/sync-proposals.mjs

      - name: Commit proposals.json if changed
        run: |
          if git diff --quiet -- proposals.json; then
            echo "No changes to proposals.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proposals.json
          git commit -m "Sync outfit proposals, comments, AMA, selections"
          git push
