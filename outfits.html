<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Outfits · My Basket</title>
<style>
  :root {
    --bg: #121218;
    --panel: #1b1b26;
    --pink: #ff9ecb;
    --violet: #c9a6ff;
    --cyan: #7df9ff;
    --gold: #ffd24c;
    --text: #f3f3f7;
    --muted: #b8b2c4;
    --border: rgba(255,158,203,0.15);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }
  .wrap { max-width: 900px; margin: 0 auto; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 28px;
    transition: color 0.2s ease;
  }
  .back-link:hover { color: var(--pink); }

  h1 {
    text-align: center;
    font-size: 26px;
    margin: 0 0 6px;
    background: linear-gradient(135deg, var(--pink), var(--violet));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 13.5px;
    margin: 0 0 40px;
  }

  /* ─── Outfit card ─── */
  .outfit-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px 26px;
    margin-bottom: 32px;
  }
  .outfit-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 22px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .outfit-name {
    font-size: 18px;
    font-weight: 800;
    color: var(--pink);
    letter-spacing: 0.3px;
  }
  .outfit-total {
    font-size: 14px;
    font-weight: 700;
    color: var(--cyan);
    background: rgba(125,249,255,0.08);
    border: 1px solid rgba(125,249,255,0.2);
    padding: 5px 14px;
    border-radius: 999px;
  }
  .outfit-proposed-by {
    font-size: 11.5px;
    font-weight: 700;
    color: var(--gold);
    background: rgba(255,210,76,0.08);
    border: 1px solid rgba(255,210,76,0.25);
    padding: 4px 12px;
    border-radius: 999px;
    width: 100%;
    margin-top: -10px;
    margin-bottom: 6px;
  }
  .outfit-top-badge {
    font-size: 11.5px;
    font-weight: 800;
    color: #1b1b26;
    background: linear-gradient(135deg, var(--gold), var(--pink));
    padding: 5px 12px;
    border-radius: 999px;
    width: 100%;
    margin-bottom: 6px;
    text-align: center;
    box-shadow: 0 0 16px rgba(255,210,76,0.3);
  }
  .outfit-header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .outfit-vote-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255,158,203,0.3);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .outfit-vote-btn:hover {
    border-color: rgba(255,158,203,0.6);
    background: rgba(255,158,203,0.1);
    transform: translateY(-1px);
  }
  .outfit-vote-btn.voted {
    border-color: transparent;
    background: linear-gradient(135deg, #ff9ecb, #c9a6ff);
    color: #1b1b26;
    cursor: default;
    transform: none;
  }
  .outfit-arrange-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid rgba(255,158,203,0.3);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .outfit-arrange-btn:hover {
    border-color: rgba(255,158,203,0.6);
    background: rgba(255,158,203,0.1);
    transform: translateY(-1px) scale(1.05);
  }
  #arrange-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 4200;
    background: rgba(8,8,14,0.82);
    backdrop-filter: blur(10px);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #arrange-overlay.open { display: flex; }
  #arrange-panel {
    width: 100%;
    max-width: 420px;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    background: #1b1b26;
    border: 1px solid rgba(255,158,203,0.3);
    border-radius: 24px;
    padding: 18px;
    box-shadow: 0 0 60px rgba(255,158,203,0.15), 0 20px 50px rgba(0,0,0,0.6);
  }
  #arrange-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  #arrange-title {
    font-size: 14.5px;
    font-weight: 800;
    color: #ff9ecb;
    text-shadow: 0 0 12px rgba(255,158,203,0.4);
  }
  #arrange-close {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #arrange-close:hover { background: rgba(255,158,203,0.2); }
  #arrange-board {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1.15;
    border-radius: 18px;
    border: 2px dashed rgba(255,158,203,0.25);
    background:
      radial-gradient(circle at 20% 20%, rgba(255,158,203,0.05), transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(201,166,255,0.05), transparent 50%),
      #14141c;
    overflow: hidden;
  }
  .arrange-item {
    position: absolute;
    transform: translate(-50%, -50%);
  }
  .arrange-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.15);
    display: block;
  }
  #arrange-hint {
    margin-top: 10px;
    text-align: center;
    font-size: 11.5px;
    color: #9c96a8;
  }
  .ov-count { font-variant-numeric: tabular-nums; }

  /* ─── Flat lay grid ─── */
  .flat-lay {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
  }
  .slot-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s ease, transform 0.2s ease;
    text-decoration: none;
  }
  .slot-item:hover {
    border-color: rgba(255,158,203,0.4);
    transform: translateY(-3px);
  }
  .slot-img-wrap {
    width: 100%;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    position: relative;
    background: #14141e;
  }
  .slot-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.35s ease;
  }
  .slot-item:hover .slot-img-wrap img { transform: scale(1.06); }
  .slot-label {
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    padding: 7px 10px 2px;
  }
  .slot-title {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text);
    padding: 0 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.35;
    margin-bottom: 4px;
  }
  .slot-price {
    font-size: 12px;
    font-weight: 800;
    color: var(--cyan);
    padding: 0 10px 10px;
  }

  /* ─── Empty state ─── */
  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    font-size: 14px;
    line-height: 1.7;
  }
  .empty-state .big { font-size: 40px; margin-bottom: 12px; }

  /* ─── Footer ─── */
  footer {
    text-align: center;
    padding: 36px 0 10px;
    color: #7a7588;
    font-size: 12.5px;
  }
  footer a {
    color: #7a7588;
    text-decoration: none;
    border-bottom: 1px dashed rgba(255,158,203,0.3);
  }
</style>
</head>
<body>
  <div class="wrap">
    <a class="back-link" href="./index.html">← Back to the basket</a>
    <h1>👗 Complete Looks</h1>
    <p class="subtitle">Full outfits assembled from my wishlist — click any piece to see it on Temu.</p>

    <div id="outfits-container">
      <div class="empty-state">
        <div class="big">✨</div>
        Loading outfits…
      </div>
    </div>

    <footer>
      <a href="./index.html">← Full wishlist</a> &nbsp;·&nbsp;
      <a href="./about.html">About this page</a>
    </footer>
  </div>

  <div id="arrange-overlay">
    <div id="arrange-panel">
      <div id="arrange-head">
        <div id="arrange-title">🧵 How it was styled</div>
        <button id="arrange-close" title="Close">✕</button>
      </div>
      <div id="arrange-board"></div>
      <div id="arrange-hint">This is the exact arrangement the visitor created in the dressing room ✨</div>
    </div>
  </div>

  <script data-goatcounter="https://nana677.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <script>
    const SLOT_LABELS = {
      top: "Top",
      bottom: "Bottom",
      shoes: "Shoes",
      accessory: "Accessory",
      misc: "Extra"
    };
    const SLOT_ORDER = ["top", "bottom", "shoes", "accessory", "misc"];
    const GOATCOUNTER_BASE = "https://nana677.goatcounter.com";

    // 🔔 Fire-and-forget Discord notification via the Cloudflare Worker relay
    const DISCORD_RELAY_URL = "https://my-basket-notify.nanana677777.workers.dev/";
    function notifyDiscord(type, detail, image) {
      try {
        fetch(DISCORD_RELAY_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type, detail: (detail || "").toString().slice(0, 150), image: image || undefined }),
        }).catch(() => {});
      } catch (e) {}
    }

    function getVotedOutfits() {
      try { return JSON.parse(localStorage.getItem("votedOutfits")) || []; } catch (e) { return []; }
    }
    function rememberVotedOutfit(id) {
      const v = getVotedOutfits();
      if (!v.includes(id)) {
        v.push(id);
        localStorage.setItem("votedOutfits", JSON.stringify(v));
      }
    }

    async function fetchOutfitVoteCount(id) {
      try {
        const res = await fetch(GOATCOUNTER_BASE + "/counter/" + encodeURIComponent("/outfit-vote/" + id) + ".json");
        if (!res.ok) return 0;
        const data = await res.json();
        return data.count_unique || data.count || 0;
      } catch (e) {
        return 0;
      }
    }

    async function loadOutfits() {
      const container = document.getElementById("outfits-container");
      try {
        const res = await fetch("./outfits.json?t=" + Date.now());
        if (!res.ok) throw new Error("HTTP " + res.status);
        const outfits = await res.json();

        if (!outfits.length) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="big">🧵</div>
              No outfits yet — check back soon!
            </div>`;
          return;
        }

        // Fetch vote counts for all outfits, then show the most-loved looks first
        const counts = await Promise.all(outfits.map(o => fetchOutfitVoteCount(o.id)));
        outfits.forEach((o, i) => { o._votes = counts[i] || 0; });
        outfits.sort((a, b) => b._votes - a._votes);

        const voted = getVotedOutfits();
        const topVotes = outfits[0] ? outfits[0]._votes : 0;

        container.innerHTML = "";
        outfits.forEach((outfit, idx) => {
          const slots = outfit.slots || {};
          let totalPrice = 0;
          SLOT_ORDER.forEach(key => {
            const item = slots[key];
            if (item && item.price) {
              const p = parseFloat((item.price || "0").toString().replace(",", "."));
              if (!isNaN(p)) totalPrice += p;
            }
          });

          const card = document.createElement("div");
          card.className = "outfit-card";

          const isTop = idx === 0 && topVotes > 0;
          const alreadyVoted = voted.includes(outfit.id);
          const repImage = SLOT_ORDER.map(k => slots[k]).find(it => it && it.image);

          const header = document.createElement("div");
          header.className = "outfit-header";
          header.innerHTML = `
            ${outfit.proposedBy ? `<div class="outfit-proposed-by">💡 Proposed by ${outfit.proposedBy.replace(/</g,"&lt;")}</div>` : ""}
            ${isTop ? `<div class="outfit-top-badge">🏆 Most loved look</div>` : ""}
            <div class="outfit-name">${(outfit.name || "Untitled Look").replace(/</g,"&lt;")}</div>
            <div class="outfit-header-right">
              <button class="outfit-vote-btn${alreadyVoted ? " voted" : ""}" data-outfit-id="${outfit.id}" data-outfit-name="${(outfit.name || "Untitled Look").replace(/"/g, "&quot;")}" data-outfit-image="${(repImage ? repImage.image : "").replace(/"/g, "&quot;")}" ${alreadyVoted ? "disabled" : ""}>🩷 <span class="ov-count">${outfit._votes > 0 ? outfit._votes : ""}</span></button>
              ${outfit.layout && outfit.layout.length ? `<button class="outfit-arrange-btn" data-arrange-idx="${idx}" title="See how it was styled">🧵</button>` : ""}
              ${totalPrice > 0 ? `<div class="outfit-total">💰 Total: ${totalPrice.toFixed(2)} €</div>` : ""}
            </div>
          `;
          card.appendChild(header);

          const flatLay = document.createElement("div");
          flatLay.className = "flat-lay";
          card.appendChild(flatLay);
          container.appendChild(card);

          SLOT_ORDER.forEach(key => {
            const item = slots[key];
            if (!item || !item.image) return;
            const a = document.createElement("a");
            a.className = "slot-item";
            a.href = item.link || "#";
            a.target = "_blank";
            a.rel = "noopener";
            a.innerHTML = `
              <div class="slot-img-wrap"><img src="${item.image}" alt="" loading="lazy"></div>
              <div class="slot-label">${SLOT_LABELS[key] || key}</div>
              <div class="slot-title">${(item.title || "").replace(/</g,"&lt;")}</div>
              ${item.price ? `<div class="slot-price">💰 ${item.price} €</div>` : ""}
            `;
            flatLay.appendChild(a);
          });
        });

        container.querySelectorAll(".outfit-arrange-btn").forEach(btn => {
          btn.addEventListener("click", () => openArrangement(outfits[parseInt(btn.dataset.arrangeIdx)]));
        });

        container.querySelectorAll(".outfit-vote-btn:not([disabled])").forEach(btn => {
          btn.addEventListener("click", () => {
            const id = btn.dataset.outfitId;
            if (window.goatcounter && window.goatcounter.count) {
              window.goatcounter.count({ path: "/outfit-vote/" + id, title: "Outfit vote", event: true });
            }
            notifyDiscord("outfit_vote", btn.dataset.outfitName || id, btn.dataset.outfitImage);
            rememberVotedOutfit(id);
            if (typeof unlockBadge === "function") unlockBadge("outfit-fan");
            btn.disabled = true;
            btn.classList.add("voted");
            const c = btn.querySelector(".ov-count");
            c.textContent = (parseInt(c.textContent) || 0) + 1;
          });
        });
      } catch (err) {
        console.error("Outfits load error:", err);
        container.innerHTML = `
          <div class="empty-state">
            <div class="big">😢</div>
            Couldn't load outfits right now. Try again later!
          </div>`;
      }
    }

    function openArrangement(outfit) {
      const board = document.getElementById("arrange-board");
      board.innerHTML = "";
      (outfit.layout || []).forEach(it => {
        const el = document.createElement("div");
        el.className = "arrange-item";
        el.style.left = it.x + "%";
        el.style.top = it.y + "%";
        el.style.width = (92 * (it.scale || 1)) + "px";
        el.style.height = (92 * (it.scale || 1)) + "px";
        el.innerHTML = `<img src="${it.image}" alt="">`;
        board.appendChild(el);
      });
      document.getElementById("arrange-overlay").classList.add("open");
    }
    function closeArrangement() {
      document.getElementById("arrange-overlay").classList.remove("open");
    }
    document.getElementById("arrange-close").addEventListener("click", closeArrangement);
    document.getElementById("arrange-overlay").addEventListener("click", (e) => {
      if (e.target.id === "arrange-overlay") closeArrangement();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeArrangement();
    });

    loadOutfits();
  </script>
  <script src="./badges.js"></script>
</body>
</html>
